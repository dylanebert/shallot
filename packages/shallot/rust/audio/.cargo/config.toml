# wasm is the shipped target — +simd128 lets rustc vectorize the DSP hot loops
# (Stage 1). Target-scoped so native builds (the golden `cargo test`, `cargo
# bench`, the diff_vector reference) compile for the host ISA, untouched. The
# shipped build (scripts/build.ts) pairs this with `wasm-opt --enable-simd`; the
# scalar A/B leg in scripts/audio-wasm-bench.ts overrides it via RUSTFLAGS.
[target.wasm32-unknown-unknown]
rustflags = ["-C", "target-feature=+simd128"]
